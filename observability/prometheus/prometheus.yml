# Prometheus scrape configuration.
#
# Two metric sources:
#   1. agent-service /metrics   -> bespoke application metrics
#      (prometheus-client): request/task rates, error rates, latency
#      histograms, token usage & cost, retries, in-memory store sizes —
#      all sliced by tenant / priority / stage / status.
#   2. otel-collector :8889     -> RED span metrics derived from traces.

global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: agent-platform-local

scrape_configs:
  - job_name: agent-service
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-service:8080"]
        labels:
          service: agent-service

  - job_name: otel-collector-spanmetrics
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
